plugins {
    id 'java'
    id 'idea'
}

repositories {
    mavenCentral()
}

group = 'com.iheartradio.m3u8'
version = '0.2.7-SNAPSHOT'

// Library remains source-compatible with Java 7 APIs; build with JDK 8+.
sourceCompatibility = '1.8'
targetCompatibility = '1.8'

dependencies {
    testImplementation 'junit:junit:4.13.2'
}

java {
    withJavadocJar()
    withSourcesJar()
}

idea {
    module {
        downloadJavadoc = true
        downloadSources = true
    }
}

// Demo HLS player HTTP server (uses JDK HttpServer + this library)
task runHlsPlayer(type: JavaExec) {
    group = 'application'
    description = 'Run the HLS demo player (open-m3u8 rewrite proxy)'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.iheartradio.m3u8.demo.HlsPlayerServer'
    args = project.hasProperty('port') ? [project.property('port')] : []
    workingDir = project.projectDir
    // Segments are streamed; heap still needs room for concurrent playlist rewrites
    jvmArgs = ['-Xms128m', '-Xmx768m']
}

test {
    useJUnit()
}
